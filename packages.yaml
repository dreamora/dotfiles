# packages.yaml — Single source of truth for all packages
# Schema: roles → categories → packages
#
# ROLES (additive):
#   - common: Base packages for all machines
#   - development: Development tools and utilities
#   - private: Personal/hobby applications
#   - business: Work-related tools and applications
#
# CATEGORIES (use what makes sense per role):
#   - cli: Command-line tools
#   - gui: Graphical applications
#   - fonts: Font packages
#   - language: Language runtimes and tools
#   - dev: Development frameworks and SDKs
#
# PACKAGE FIELDS:
#   - name (required): Package name
#   - os (optional): darwin or linux (defaults to all)
#   - method (optional): brew, cask, apt, snap, flatpak, mas, npm, gem (defaults to brew)
#   - tap (optional): Homebrew tap required for this package
#   - id (optional): Mac App Store ID (for mas method)
#   - options (optional): Installation options (e.g., "link: false", "restart_service: :changed")

